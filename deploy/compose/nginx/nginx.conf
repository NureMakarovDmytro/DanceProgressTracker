# Конфігурація Nginx як балансувальника навантаження (Load Balancer) для
# бекенда DanceProgressTracker. Nginx приймає всі вхідні HTTP-запити на порт 80
# і рівномірно розподіляє їх між копіями сервісу backend (алгоритм round-robin).

worker_processes auto;

events {
    worker_connections 4096;
}

http {
    # Вбудований DNS-резолвер Docker. Він повертає IP-адреси УСІХ копій сервісу
    # backend, тож при `--scale backend=N` балансувальник бачить усі N інстансів.
    resolver 127.0.0.11 valid=5s ipv6=off;

    # Дешеві логи (вимкнено буферизований доступний лог для меншого I/O під тестом).
    access_log off;
    sendfile on;
    keepalive_timeout 30;

    server {
        listen 80;

        # Власний health-check балансувальника (не проксіюється на backend).
        location = /nginx-health {
            add_header Content-Type text/plain;
            return 200 "lb-ok\n";
        }

        location / {
            # Ім'я сервісу backend із docker-compose. Запис через ЗМІННУ змушує
            # Nginx резолвити DNS у рантаймі на кожен запит, тому нові копії,
            # додані `--scale`, одразу потрапляють у ротацію (round-robin).
            set $pool backend:4000;
            proxy_pass http://$pool;

            # Стандартні заголовки: зберігаємо реальну IP-адресу та протокол клієнта.
            proxy_set_header Host              $host;
            proxy_set_header X-Real-IP         $remote_addr;
            proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;

            # Якщо одна копія не відповідає — пробуємо наступну (відмовостійкість).
            proxy_next_upstream error timeout http_502 http_503 http_504;
            proxy_connect_timeout 2s;
        }
    }
}
