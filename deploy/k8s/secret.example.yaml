# ПРИКЛАД Secret-а для бекенда (JWT_SECRET).
# Це шаблон — НЕ комітьте справжні секрети у репозиторій.
#
# Значення в полі data мають бути у base64. Тут base64("dev-secret-change-me").
# Згенерувати власне:
#   echo -n 'мій-надсекретний-ключ' | base64
#
# Або створити Secret напряму, без файлу (надійніше):
#   kubectl -n dpt create secret generic backend-secret \
#     --from-literal=jwt-secret='мій-надсекретний-ключ'
apiVersion: v1
kind: Secret
metadata:
  name: backend-secret
  namespace: dpt
type: Opaque
data:
  jwt-secret: ZGV2LXNlY3JldC1jaGFuZ2UtbWU=
