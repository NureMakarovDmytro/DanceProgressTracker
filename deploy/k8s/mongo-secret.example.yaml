# ПРИКЛАД (опційний) Secret-а з кредами Mongo.
# mongo.yaml читає його з optional: true — без цього Secret-а Mongo стартує без автентифікації,
# що цілком достатньо для лабораторної демонстрації масштабування.
#
# base64-значення нижче: username="root", password="example".
#   echo -n 'root'    | base64   ->  cm9vdA==
#   echo -n 'example' | base64   ->  ZXhhbXBsZQ==
#
# Якщо вмикаєте автентифікацію Mongo — не забудьте додати креди в MONGO_URI
# у backend-deployment.yaml, напр.: mongodb://root:example@mongo.dpt.svc.cluster.local:27017/dpt?authSource=admin
apiVersion: v1
kind: Secret
metadata:
  name: mongo-secret
  namespace: dpt
type: Opaque
data:
  username: cm9vdA==
  password: ZXhhbXBsZQ==
